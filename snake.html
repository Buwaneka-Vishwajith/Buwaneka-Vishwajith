<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>snake.exe — Buwaneka's GitHub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --green: #3fb950;
    --green-dim: #238636;
    --green-bright: #56d364;
    --blue: #58a6ff;
    --red: #f78166;
    --text: #e6edf3;
    --muted: #8b949e;
    --dimmer: #484f58;
  }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 20px;
  }

  .terminal {
    width: 100%;
    max-width: 560px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(63, 185, 80, 0.08);
  }

  .term-bar {
    background: var(--surface);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }

  .term-title {
    margin-left: 10px;
    font-size: 13px;
    color: var(--muted);
  }

  .term-title span { color: var(--green); }

  .term-status {
    margin-left: auto;
    font-size: 11px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .game-area {
    background: var(--bg);
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .stats-row {
    display: flex;
    gap: 32px;
    font-size: 12px;
    color: var(--muted);
    width: 100%;
    justify-content: center;
  }

  .stat-val { color: var(--green); font-size: 16px; display: block; margin-top: 2px; }

  canvas {
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    display: block;
    image-rendering: pixelated;
    width: 100%;
    max-width: 480px;
    height: auto;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    background: var(--green-dim);
    border: 1px solid var(--green);
    color: #fff;
    border-radius: 6px;
    padding: 10px 28px;
    font-size: 13px;
    font-family: inherit;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { background: var(--green); box-shadow: 0 0 16px rgba(63,185,80,0.3); }
  .btn:active { transform: scale(0.96); }

  .dpad {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .dpad-row { display: flex; gap: 4px; }

  .dkey {
    width: 40px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .dkey:hover { border-color: var(--green); color: var(--green); background: #161b22; }
  .dkey:active { transform: scale(0.9); background: var(--green-dim); color: #fff; }

  .hint {
    font-size: 11px;
    color: var(--dimmer);
    text-align: center;
  }

  .back-link {
    margin-top: 20px;
    font-size: 12px;
    color: var(--dimmer);
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .back-link:hover { color: var(--blue); }

  .scanlines {
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    z-index: 999;
  }
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="terminal">
  <div class="term-bar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="term-title">~/<span>buwaneka</span>/snake.exe</span>
    <div class="term-status">
      <div class="pulse"></div> LIVE
    </div>
  </div>

  <div class="game-area">
    <div class="stats-row">
      <div>
        SCORE<span class="stat-val" id="score">0</span>
      </div>
      <div>
        HIGH SCORE<span class="stat-val" id="high">0</span>
      </div>
      <div>
        LEVEL<span class="stat-val" id="lvl">1</span>
      </div>
    </div>

    <canvas id="c" width="480" height="360"></canvas>

    <div class="btn-row">
      <button class="btn" id="startBtn" onclick="startGame()">▶ START</button>
    </div>

    <div class="dpad">
      <div class="dpad-row">
        <div class="dkey" onclick="setDir(0,-1)" ontouchstart="setDir(0,-1)">↑</div>
      </div>
      <div class="dpad-row">
        <div class="dkey" onclick="setDir(-1,0)" ontouchstart="setDir(-1,0)">←</div>
        <div class="dkey" onclick="setDir(0,1)" ontouchstart="setDir(0,1)">↓</div>
        <div class="dkey" onclick="setDir(1,0)" ontouchstart="setDir(1,0)">→</div>
      </div>
    </div>

    <div class="hint">Arrow keys · WASD · or tap the D-pad above</div>
  </div>
</div>

<a class="back-link" href="https://github.com/Buwaneka-Vishwajith">
  ← back to github profile
</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CELL = 24, COLS = 20, ROWS = 15;

let snake, dir, nextDir, food, score, highScore = 0, level, running = false, interval, particles = [];

function startGame() {
  snake = [{x:10,y:7},{x:9,y:7},{x:8,y:7}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; level = 1; particles = [];
  placeFood();
  running = true;
  document.getElementById('startBtn').textContent = '↺ RESTART';
  clearInterval(interval);
  interval = setInterval(tick, 130);
}

function placeFood() {
  do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===food.x&&s.y===food.y));
}

function setDir(x, y) {
  if((x!==0&&dir.x===0)||(y!==0&&dir.y===0)) nextDir = {x,y};
}

function spawnParticles(x, y) {
  for(let i=0;i<8;i++) {
    particles.push({
      x: x*CELL+CELL/2, y: y*CELL+CELL/2,
      vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
      life: 1, color: Math.random()>0.5 ? '#3fb950' : '#f78166'
    });
  }
}

function tick() {
  dir = nextDir;
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    running = false; clearInterval(interval); draw(true); return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y) {
    score += 10 * level;
    if(score>highScore) highScore=score;
    level = Math.floor(score/100)+1;
    spawnParticles(food.x, food.y);
    placeFood();
    clearInterval(interval);
    interval = setInterval(tick, Math.max(55, 130-(level-1)*12));
  } else { snake.pop(); }
  document.getElementById('score').textContent = score;
  document.getElementById('high').textContent = highScore;
  document.getElementById('lvl').textContent = level;
  draw(false);
}

function draw(dead) {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0,0,w,h);

  // subtle grid
  ctx.fillStyle = '#161b22';
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) {
    ctx.fillRect(x*CELL+CELL/2-1, y*CELL+CELL/2-1, 2, 2);
  }

  // particles
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life-=0.08;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  });
  ctx.globalAlpha = 1;

  // food with glow
  ctx.shadowColor = '#f78166';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#f78166';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, 7, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // snake
  snake.forEach((s,i)=>{
    const alpha = dead ? 0.35 : 1;
    ctx.globalAlpha = alpha;
    if(i===0) {
      ctx.shadowColor = '#3fb950';
      ctx.shadowBlur = dead ? 0 : 8;
    }
    const t = i/snake.length;
    const r = Math.round(63-(63-35)*t);
    const g = Math.round(185-(185-130)*t);
    const b = Math.round(80-(80-60)*t);
    ctx.fillStyle = i===0 ? '#3fb950' : `rgb(${r},${g},${b})`;
    ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    ctx.shadowBlur = 0;

    // eyes on head
    if(i===0 && !dead) {
      ctx.fillStyle = '#0d1117';
      const cx = s.x*CELL+CELL/2, cy = s.y*CELL+CELL/2;
      const dx = dir.x, dy = dir.y;
      const perpX = -dy, perpY = dx;
      const forwardDist = 4, sideDist = 3;
      ctx.fillRect(cx+dx*forwardDist+perpX*sideDist-1.5, cy+dy*forwardDist+perpY*sideDist-1.5, 3, 3);
      ctx.fillRect(cx+dx*forwardDist-perpX*sideDist-1.5, cy+dy*forwardDist-perpY*sideDist-1.5, 3, 3);
    }
    ctx.globalAlpha = 1;
  });

  // overlay states
  if(!running) {
    ctx.fillStyle = 'rgba(13,17,23,0.82)';
    ctx.fillRect(0,0,w,h);
    if(dead) {
      ctx.fillStyle='#f78166'; ctx.font='bold 22px "Share Tech Mono", monospace'; ctx.textAlign='center';
      ctx.fillText('GAME OVER', w/2, h/2-20);
      ctx.fillStyle='#8b949e'; ctx.font='14px "Share Tech Mono", monospace';
      ctx.fillText(`score: ${score}  |  high: ${highScore}`, w/2, h/2+8);
      ctx.fillStyle='#484f58'; ctx.font='11px "Share Tech Mono", monospace';
      ctx.fillText('press SPACE or tap RESTART', w/2, h/2+34);
    } else {
      ctx.fillStyle='#3fb950'; ctx.font='bold 18px "Share Tech Mono", monospace'; ctx.textAlign='center';
      ctx.fillText('> snake.exe', w/2, h/2-12);
      ctx.fillStyle='#8b949e'; ctx.font='13px "Share Tech Mono", monospace';
      ctx.fillText('press START or SPACE to play', w/2, h/2+14);
    }
  }
}

document.addEventListener('keydown', e=>{
  const map = {ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
                w:[0,-1], s:[0,1], a:[-1,0], d:[1,0]};
  if(map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
  if(e.key===' ') { e.preventDefault(); startGame(); }
});

// touch swipe
let tx, ty;
canvas.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1, 0);
  else setDir(0, dy>0?1:-1);
  e.preventDefault();
}, {passive:false});

draw(false);
</script>
</body>
</html>
